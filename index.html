<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <title>Lab API NASA APOD Grupo 16</title>
</head>

<body class="bg-dark text-light">

    <div class="container py-4">
        <h1 class="text-center mb-4">Explorador APOD NASA</h1>

        <div class="card bg-secondary text-light mb-4">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-6">
                        <label for="entradaFecha" class="form-label">Selecciona una fecha</label>
                        <input type="date" id="entradaFecha" class="form-control" />
                    </div>
                    <div class="col-md-3">
                        <button id="botonBuscar" class="btn btn-warning w-100">Buscar</button>
                    </div>
                    <div class="col-md-3">
                        <button id="botonHoy" class="btn btn-info w-100">Foto de hoy</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="contenedorApod" class="mb-4"></div>

        <div class="card bg-secondary text-light">
            <div class="card-body">
                <h3>Favoritos</h3>
                <ul id="listaFavoritos" class="list-group list-group-flush"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
